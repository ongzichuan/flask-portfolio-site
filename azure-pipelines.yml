trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  dockerHubRepo: 'ongzichuan/flask-k8s-project'

stages:
  - stage: Build
    displayName: Build and Push Docker Image
    jobs:
      - job: Build
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Login to Docker Hub
            inputs:
              command: login
              containerRegistry: 'dockerhub-service-connection'

          - task: Docker@2
            displayName: Build and Push Image
            inputs:
              command: buildAndPush
              repository: '$(dockerHubRepo)'
              dockerfile: 'app/Dockerfile'
              buildContext: '.'
              tags: |
                latest

  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Build
    jobs:
      - job: Deploy
        steps:
          - checkout: self

          - script: |
              kubectl apply -f k8s/deployment.yaml
              kubectl apply -f k8s/service.yaml
              kubectl rollout status deployment/flask-k8s-app
            displayName: Deploy to Kubernetes
