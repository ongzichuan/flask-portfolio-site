<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Ong Zichuan</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:           #0a192f;
      --light-navy:     #112240;
      --lightest-navy:  #233554;
      --slate:          #8892b0;
      --light-slate:    #a8b2d8;
      --lightest-slate: #ccd6f6;
      --green:          #64ffda;
      --green-tint:     rgba(100,255,218,0.1);
      --font-sans:      'DM Sans', sans-serif;
      --font-mono:      'Source Code Pro', monospace;
      --transition:     all 0.25s cubic-bezier(0.645,0.045,0.355,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      color: var(--slate);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--light-navy);
      border: 1px solid var(--lightest-navy);
      border-radius: 12px;
      padding: 40px 36px;
    }

    .login-brand {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--lightest-slate);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--slate);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Error alert */
    .alert {
      background: rgba(255,100,100,0.08);
      border: 1px solid rgba(255,100,100,0.3);
      color: #ff6b6b;
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--light-slate);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--lightest-navy);
      border-radius: 6px;
      color: var(--lightest-slate);
      font-family: var(--font-sans);
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: var(--transition);
    }

    .form-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(100,255,218,0.08);
    }

    .form-group input::placeholder { color: var(--slate); opacity: 0.5; }

    .login-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--green-tint);
      transform: translateY(-1px);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--slate);
      text-decoration: none;
      transition: var(--transition);
    }

    .back-link:hover { color: var(--green); }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-brand">// portfolio.tototio.com</div>
    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Log in to leave a comment on the portfolio.</p>

    {% if error %}
    <div class="alert">⚠ Incorrect username or password. Try again.</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="login-btn">Log In →</button>
    </form>

    <a href="{{ url_for('home') }}" class="back-link">← Back to portfolio</a>
  </div>

</body>
</html>
