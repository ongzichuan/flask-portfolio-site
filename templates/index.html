<script>

  const radialGlow = document.getElementById('radialGlow');

  // Background glow follows mouse
  document.addEventListener('mousemove', e => {
    radialGlow.style.background =
      `radial-gradient(600px at ${e.clientX}px ${e.clientY}px, rgba(29,78,216,0.12), transparent 80%)`;
  });

  // Active navigation highlight
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('.nav-link');

  const navObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(l => l.classList.remove('active'));

        const active = document.querySelector(
          `.nav-link[href="#${e.target.id}"]`
        );

        if (active) {
          active.classList.add('active');
        }
      }
    });
  }, {
    rootMargin: '-30% 0px -60% 0px'
  });

  sections.forEach(section => {
    navObserver.observe(section);
  });

  // Fade in animation
  const fadeObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        fadeObserver.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.1
  });

  document.querySelectorAll('.fade-in').forEach(el => {
    fadeObserver.observe(el);
  });

</script>
