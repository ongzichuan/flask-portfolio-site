name: Auto Deploy Portfolio

on:
  push:
    branches:
      - main
    paths:
      - "**.html"
      - "**.css"
      - "**.js"
      - "app.py"
      - "Dockerfile"
      - "docker-compose.yml"
      - "compose.yml"

jobs:
  deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Pull latest code
        run: |
          cd ~/portfolio-site
          git pull origin main

      - name: Rebuild and restart Docker Compose
        run: |
          cd ~/portfolio-site
          docker compose down
          docker compose build --no-cache
          docker compose up -d