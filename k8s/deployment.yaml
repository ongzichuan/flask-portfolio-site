apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-k8s-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-k8s-appsudo kubectl get pods
  template:
    metadata:
      labels:
        app: flask-k8s-app
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: flask-k8s-app
          image: ongzichuan/flask-k8s-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
